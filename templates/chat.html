<!DOCTYPE html>
<html lang="es">
<head>
    <!-- Metadatos del documento -->
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat - Sistema de Órdenes WhatsApp</title>
    
    <!-- Vincular hoja de estilos externa -->
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <!-- Contenedor principal del chat -->
    <div class="chat-container">
        <!-- Encabezado del chat -->
        <div class="chat-header">
            <h1>Sistema de Órdenes</h1>
            <p>Chat de atención al cliente</p>
        </div>
        
        <!-- Área de mensajes donde se muestran las conversaciones -->
        <div class="chat-messages" id="chatMessages">
            <!-- Los mensajes se agregan dinámicamente con JavaScript -->
        </div>
        
        <!-- Área de botones de acciones rápidas -->
        <div class="quick-actions" id="quickActions">
            <!-- Los botones se generan dinámicamente según el estado -->
        </div>
        
        <!-- Área de entrada de mensajes -->
        <div class="chat-input-area">
            <div class="input-wrapper">
                <input 
                    type="text" 
                    id="messageInput" 
                    placeholder="Escribe tu mensaje aquí..." 
                    class="message-input"
                    autocomplete="off"
                    aria-label="Campo de entrada de mensajes"
                >
                <!-- Indicador de validación -->
                <span class="validation-indicator" id="validationIndicator"></span>
            </div>
            
            <!-- Área de sugerencias/autocompletado -->
            <div class="suggestions-box" id="suggestionsBox">
                <!-- Las sugerencias se generan dinámicamente -->
            </div>
            
            <!-- Botón para enviar mensaje -->
            <button 
                id="sendButton" 
                class="send-button"
                onclick="enviarMensaje()"
                aria-label="Enviar mensaje"
            >
                Enviar
            </button>
        </div>
    </div>
    
    <!-- Vincular archivo JavaScript externo -->
    <script src="{{ url_for('static', filename='chat.js') }}"></script>
</body>
</html>
